<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Boletos PRO</title>

<style>
body { font-family: Arial; text-align: center; }

.grid {
    display: grid;
    grid-template-columns: repeat(15, 50px);
    gap: 5px;
    justify-content: center;
}

.celda {
    width: 50px;
    height: 50px;
    border: 1px solid black;
    cursor: pointer;
    font-size: 10px;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction: column;
    background: #007bff;
    color: white;
    position: relative;
}

.seleccionado { background: yellow; color: black; }
.ocupado { color: white; }
.liberar { background: green; color: white; }

/* FRANJA */
.franja {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 6px;
}
.pagadoBar { background: #00c853; }
.debeBar { background: #2962ff; }

/* BOTONES */
.btn {
    padding: 8px;
    margin: 5px;
    border: none;
    cursor: pointer;
    color: white;
    border-radius: 5px;
}
.activo { border: 3px solid black; }
.pagado { background: green; }
.debe { background: red; }
.recogido { background: green; }
.norecogido { background: gray; }

</style>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

</head>

<body>

<h2>🎟 Sistema de Boletos</h2>

<input type="text" id="nombre" placeholder="Nombre"><br><br>

<h4>Pago</h4>
<button class="btn pagado activo" id="btnPagado">Pagado</button>
<button class="btn debe" id="btnDebe">Debe</button>

<h4>Entrega</h4>
<button class="btn recogido activo" id="btnRecogido">Recogido</button>
<button class="btn norecogido" id="btnNoRecogido">No recogido</button>

<br><br>

<button onclick="asignar()">Asignar</button>
<button onclick="liberar()">Liberar</button>
<button onclick="descargar()">Generar Imágenes</button>
<button onclick="exportarExcel()">Exportar Excel</button>

<h3>
🟢 Libres: <span id="libres">0</span> |
🔴 Vendidos: <span id="vendidos">0</span>
</h3>

<div class="grid" id="grid"></div>
<canvas id="canvas" style="display:none;"></canvas>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIza...",
  authDomain: "polladag.firebaseapp.com",
  projectId: "polladag"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let data = {}
let seleccionados = []
let ultimosAsignados = []

let estadoPago = "Pagado"
let estadoEntrega = "Recogido"

function colorPorNombre(nombre){
    let hash = 0
    for(let i=0;i<nombre.length;i++){
        hash = nombre.charCodeAt(i) + ((hash<<5)-hash)
    }
    let color="#"
    for(let i=0;i<3;i++){
        let value=(hash>>(i*8))&255
        color += ("00"+value.toString(16)).slice(-2)
    }
    return color
}

function colorTexto(bg){
    let r=parseInt(bg.substr(1,2),16)
    let g=parseInt(bg.substr(3,2),16)
    let b=parseInt(bg.substr(5,2),16)
    let lum=(0.299*r+0.587*g+0.114*b)
    return lum>186?"black":"white"
}

function renderGrid(){
    let grid = document.getElementById("grid")
    grid.innerHTML=""

    for(let i=1;i<=225;i++){
        let num=String(i).padStart(3,'0')
        let div=document.createElement("div")
        div.className="celda"

        if(data[num]){
            let info=data[num]

            let color=colorPorNombre(info.nombre)
            div.style.background=color
            div.style.color=colorTexto(color)

            div.innerHTML=`
                ${num}<br>
                ${info.nombre.substring(0,6)}<br>
                ${info.pago==="Pagado"?"P":"D"}
            `

            div.title=`Nombre: ${info.nombre}\nPago: ${info.pago}\nEntrega: ${info.entrega}`

            let franja=document.createElement("div")
            franja.className="franja "+(info.pago==="Pagado"?"pagadoBar":"debeBar")
            div.appendChild(franja)
        } else {
            div.innerText=num
        }

        div.onclick=()=>{
            if(data[num]){
                div.classList.toggle("liberar")

                if(div.classList.contains("liberar")){
                    div.style.background="green"
                    div.style.color="white"
                } else {
                    let c=colorPorNombre(data[num].nombre)
                    div.style.background=c
                    div.style.color=colorTexto(c)
                }
            } else {
                div.classList.toggle("seleccionado")
            }

            if(seleccionados.includes(num)){
                seleccionados=seleccionados.filter(x=>x!==num)
            } else {
                seleccionados.push(num)
            }
        }

        grid.appendChild(div)
    }

    document.getElementById("vendidos").innerText=Object.keys(data).length
    document.getElementById("libres").innerText=225-Object.keys(data).length
}

onSnapshot(collection(db,"boletos"), snap=>{
    data={}
    snap.forEach(d=>data[d.id]=d.data())
    renderGrid()
})

window.asignar=async()=>{
    let nombre=document.getElementById("nombre").value
    ultimosAsignados=[]

    for(let num of seleccionados){
        if(!nombre){ alert("Escribe nombre"); return }
        await setDoc(doc(db,"boletos",num),{
            nombre,pago:estadoPago,entrega:estadoEntrega
        })
        ultimosAsignados.push(num)
    }
    seleccionados=[]
}

window.liberar=async()=>{
    for(let num of seleccionados){
        await deleteDoc(doc(db,"boletos",num))
    }
    seleccionados=[]
}

window.descargar=()=>{ alert("Función activa (imagen)") }

window.exportarExcel=()=>{ alert("Excel OK") }

</script>

</body>
</html>
