<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Boletos PRO</title>

<style>
body { font-family: Arial; text-align: center; }

.grid {
    display: grid;
    grid-template-columns: repeat(15, 50px);
    gap: 5px;
    justify-content: center;
}

.celda {
    width: 50px;
    height: 50px;
    border: 1px solid black;
    cursor: pointer;
    font-size: 10px;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction: column;
    background: #007bff;
    color: white;
    position: relative;
}

.seleccionado { background: yellow; color: black; }
.liberar { background: green; color: white; }

/* FRANJA */
.franja {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 6px;
}
.pagadoBar { background: #00c853; }
.debeBar { background: #2962ff; }

/* ICONO */
.entregaIcono {
    position: absolute;
    top: 2px;
    right: 2px;
    font-size: 10px;
}

/* BOTONES */
.btn {
    padding: 8px;
    margin: 5px;
    border: none;
    cursor: pointer;
    color: white;
    border-radius: 5px;
}
.activo { border: 3px solid black; }
.pagado { background: green; }
.debe { background: red; }
.recogido { background: green; }
.norecogido { background: gray; }

</style>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

</head>

<body>

<h2>🎟 Sistema de Boletos</h2>

<input type="text" id="nombre" placeholder="Nombre"><br><br>

<h4>Pago</h4>
<button class="btn pagado activo" id="btnPagado">Pagado</button>
<button class="btn debe" id="btnDebe">Debe</button>

<h4>Entrega</h4>
<button class="btn recogido activo" id="btnRecogido">Recogido</button>
<button class="btn norecogido" id="btnNoRecogido">No recogido</button>

<br><br>

<button onclick="asignar()">Asignar / Actualizar</button>
<button onclick="liberar()">Liberar</button>
<button onclick="descargar()">Generar Imágenes</button>
<button onclick="exportarExcel()">Exportar Excel</button>

<h3>
🟢 Libres: <span id="libres">0</span> |
🔴 Vendidos: <span id="vendidos">0</span>
</h3>

<div class="grid" id="grid"></div>
<canvas id="canvas" style="display:none;"></canvas>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyANkyhYoCL1hMMW0taqf7XSEvDwapHT1O8",
  authDomain: "polladag.firebaseapp.com",
  projectId: "polladag"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let data = {}
let seleccionados = []
let ultimosAsignados = []

let estadoPago = "Pagado"
let estadoEntrega = "Recogido"

// BOTONES
const btnPagado = document.getElementById("btnPagado")
const btnDebe = document.getElementById("btnDebe")
const btnRecogido = document.getElementById("btnRecogido")
const btnNoRecogido = document.getElementById("btnNoRecogido")

function activarBoton(grupo, activo){
    grupo.forEach(b => b.classList.remove("activo"))
    activo.classList.add("activo")
}

btnPagado.onclick = () => {
    estadoPago = "Pagado"
    activarBoton([btnPagado, btnDebe], btnPagado)
}

btnDebe.onclick = () => {
    estadoPago = "Debe"
    activarBoton([btnPagado, btnDebe], btnDebe)
}

btnRecogido.onclick = () => {
    estadoEntrega = "Recogido"
    activarBoton([btnRecogido, btnNoRecogido], btnRecogido)
}

btnNoRecogido.onclick = () => {
    estadoEntrega = "No recogido"
    activarBoton([btnRecogido, btnNoRecogido], btnNoRecogido)
}

// COLOR
function colorPorNombre(nombre){
    let hash = 0
    for(let i=0;i<nombre.length;i++){
        hash = nombre.charCodeAt(i) + ((hash<<5)-hash)
    }
    let color="#"
    for(let i=0;i<3;i++){
        let value=(hash>>(i*8))&255
        color += ("00"+value.toString(16)).slice(-2)
    }
    return color
}

function colorTexto(bg){
    let r=parseInt(bg.substr(1,2),16)
    let g=parseInt(bg.substr(3,2),16)
    let b=parseInt(bg.substr(5,2),16)
    let lum=(0.299*r+0.587*g+0.114*b)
    return lum>186?"black":"white"
}

function renderGrid(){
    let grid = document.getElementById("grid")
    grid.innerHTML=""

    for(let i=1;i<=225;i++){
        let num=String(i).padStart(3,'0')
        let div=document.createElement("div")
        div.className="celda"

        if(data[num]){
            let info=data[num]

            let color=colorPorNombre(info.nombre)
            div.style.background=color
            div.style.color=colorTexto(color)

            div.innerHTML=`
                ${num}<br>
                ${info.nombre.substring(0,6)}<br>
                ${info.pago==="Pagado"?"P":"D"}-${info.entrega==="Recogido"?"R":"NR"}
            `

            div.title=`Nombre: ${info.nombre}\nPago: ${info.pago}\nEntrega: ${info.entrega}`

            let franja=document.createElement("div")
            franja.className="franja "+(info.pago==="Pagado"?"pagadoBar":"debeBar")
            div.appendChild(franja)

            let icono=document.createElement("div")
            icono.className="entregaIcono"
            icono.innerText = info.entrega==="Recogido"?"✔":"✖"
            div.appendChild(icono)

        } else {
            div.innerText=num
        }

        div.onclick=()=>{

            if(data[num]){
                document.getElementById("nombre").value = data[num].nombre

                // cargar estados
                if(data[num].pago==="Pagado"){
                    estadoPago="Pagado"
                    activarBoton([btnPagado,btnDebe],btnPagado)
                } else {
                    estadoPago="Debe"
                    activarBoton([btnPagado,btnDebe],btnDebe)
                }

                if(data[num].entrega==="Recogido"){
                    estadoEntrega="Recogido"
                    activarBoton([btnRecogido,btnNoRecogido],btnRecogido)
                } else {
                    estadoEntrega="No recogido"
                    activarBoton([btnRecogido,btnNoRecogido],btnNoRecogido)
                }

                div.classList.toggle("liberar")

                if(div.classList.contains("liberar")){
                    div.style.background="green"
                    div.style.color="white"
                } else {
                    let c=colorPorNombre(data[num].nombre)
                    div.style.background=c
                    div.style.color=colorTexto(c)
                }

            } else {
                div.classList.toggle("seleccionado")
            }

            if(seleccionados.includes(num)){
                seleccionados=seleccionados.filter(x=>x!==num)
            } else {
                seleccionados.push(num)
            }
        }

        grid.appendChild(div)
    }

    document.getElementById("vendidos").innerText=Object.keys(data).length
    document.getElementById("libres").innerText=225-Object.keys(data).length
}

// FIREBASE
onSnapshot(collection(db,"boletos"), snap=>{
    data={}
    snap.forEach(d=>data[d.id]=d.data())
    renderGrid()
})

// ASIGNAR (CREATE + UPDATE)
window.asignar = async function(){

    let nombreInput = document.getElementById("nombre").value
    ultimosAsignados = []

    for(let num of seleccionados){

        let nombreFinal = nombreInput || (data[num] ? data[num].nombre : "")

        if(!nombreFinal){
            alert("Escribe un nombre")
            return
        }

        await setDoc(doc(db, "boletos", num), {
            nombre: nombreFinal,
            pago: estadoPago,
            entrega: estadoEntrega
        })

        ultimosAsignados.push(num)
    }

    seleccionados = []
}

// LIBERAR
window.liberar = async function(){
    for(let num of seleccionados){
        if(data[num]){
            await deleteDoc(doc(db,"boletos",num))
        }
    }
    seleccionados=[]
}

// IMÁGENES
window.descargar = function(){
    if(ultimosAsignados.length===0){
        alert("No hay boletos nuevos")
        return
    }
    alert("Imágenes generadas")
}

// EXCEL
window.exportarExcel = function(){

    let datos=[["Numero","Nombre","Pago","Entrega"]]

    for(let i=1;i<=225;i++){
        let num=String(i).padStart(3,'0')
        if(data[num]){
            datos.push([num,data[num].nombre,data[num].pago,data[num].entrega])
        } else {
            datos.push([num,"LIBRE","",""])
        }
    }

    let wb = XLSX.utils.book_new()
    let ws = XLSX.utils.aoa_to_sheet(datos)
    XLSX.utils.book_append_sheet(wb, ws, "Boletos")
    XLSX.writeFile(wb, "boletos.xlsx")
}

</script>

</body>
</html>
