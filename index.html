<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Boletos PRO</title>

<style>
body { font-family: Arial; text-align: center; }

.grid {
    display: grid;
    grid-template-columns: repeat(15, 50px);
    gap: 5px;
    justify-content: center;
}

.celda {
    width: 50px;
    height: 50px;
    border: 1px solid black;
    cursor: pointer;
    font-size: 12px;
    display:flex;
    align-items:center;
    justify-content:center;
    background: #007bff;
    color: white;
}

.seleccionado { background: yellow; color: black; }
.ocupado { background: red; color: white; }
.liberar { background: green; color: white; }

.btn {
    padding: 8px 12px;
    margin: 5px;
    border: none;
    cursor: pointer;
    color: white;
    border-radius: 5px;
}

.activo { border: 3px solid black; }

.pagado { background: green; }
.debe { background: red; }

.recogido { background: green; }
.norecogido { background: gray; }
</style>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

</head>

<body>

<h2>🎟 Sistema de Boletos</h2>

<input type="text" id="nombre" placeholder="Nombre"><br><br>

<h4>Pago</h4>
<button class="btn pagado activo" id="btnPagado">Pagado</button>
<button class="btn debe" id="btnDebe">Debe</button>

<h4>Entrega</h4>
<button class="btn recogido activo" id="btnRecogido">Recogido</button>
<button class="btn norecogido" id="btnNoRecogido">No recogido</button>

<br><br>

<button onclick="asignar()">Asignar / Actualizar</button>
<button onclick="liberar()">Liberar</button>
<button onclick="descargar()">Generar Imágenes</button>
<button onclick="exportarExcel()">Exportar Excel</button>

<h3>
🟢 Libres: <span id="libres">0</span> |
🔴 Vendidos: <span id="vendidos">0</span>
</h3>

<p>🔵 Libres | 🔴 Vendidos | 🟢 Liberar</p>

<div class="grid" id="grid"></div>

<canvas id="canvas" style="display:none;"></canvas>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyANkyhYoCL1hMMW0taqf7XSEvDwapHT1O8",
  authDomain: "polladag.firebaseapp.com",
  projectId: "polladag",
  storageBucket: "polladag.firebasestorage.app",
  messagingSenderId: "392850708569",
  appId: "1:392850708569:web:f901a1d0fa6d7c7da1f948"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let imagen = new Image()
imagen.src = "i1.png"

let seleccionados = []
let data = {}
let ultimosAsignados = []

let estadoPago = "Pagado"
let estadoEntrega = "Recogido"

// BOTONES
function activarBoton(grupo, activo){
    grupo.forEach(btn => btn.classList.remove("activo"))
    activo.classList.add("activo")
}

const btnPagado = document.getElementById("btnPagado")
const btnDebe = document.getElementById("btnDebe")

btnPagado.onclick = () => {
    estadoPago = "Pagado"
    activarBoton([btnPagado, btnDebe], btnPagado)
}

btnDebe.onclick = () => {
    estadoPago = "Debe"
    activarBoton([btnPagado, btnDebe], btnDebe)
}

const btnRecogido = document.getElementById("btnRecogido")
const btnNoRecogido = document.getElementById("btnNoRecogido")

btnRecogido.onclick = () => {
    estadoEntrega = "Recogido"
    activarBoton([btnRecogido, btnNoRecogido], btnRecogido)
}

btnNoRecogido.onclick = () => {
    estadoEntrega = "No recogido"
    activarBoton([btnRecogido, btnNoRecogido], btnNoRecogido)
}

const grid = document.getElementById("grid")

function actualizarContador(){
    let vendidos = Object.keys(data).length
    let libres = 150 - vendidos

    document.getElementById("vendidos").innerText = vendidos
    document.getElementById("libres").innerText = libres
}

function renderGrid(){
    grid.innerHTML = ""

    for(let i=1; i<=150; i++){
        let num = String(i).padStart(3,'0')

        let div = document.createElement("div")
        div.className = "celda"
        div.innerText = num

        if(data[num]){
            div.classList.add("ocupado")

            let info = data[num]
            div.title =
                "Nombre: " + info.nombre + "\n" +
                "Pago: " + info.pago + "\n" +
                "Entrega: " + info.entrega
        }

        div.onclick = () => {

            if(data[num]){
                div.classList.toggle("liberar")

                // 🔥 CARGAR DATOS
                document.getElementById("nombre").value = data[num].nombre

                if(data[num].pago === "Pagado"){
                    estadoPago = "Pagado"
                    activarBoton([btnPagado, btnDebe], btnPagado)
                } else {
                    estadoPago = "Debe"
                    activarBoton([btnPagado, btnDebe], btnDebe)
                }

                if(data[num].entrega === "Recogido"){
                    estadoEntrega = "Recogido"
                    activarBoton([btnRecogido, btnNoRecogido], btnRecogido)
                } else {
                    estadoEntrega = "No recogido"
                    activarBoton([btnRecogido, btnNoRecogido], btnNoRecogido)
                }

            } else {
                div.classList.toggle("seleccionado")
            }

            if(seleccionados.includes(num)){
                seleccionados = seleccionados.filter(x => x !== num)
            } else {
                seleccionados.push(num)
            }
        }

        grid.appendChild(div)
    }
}

onSnapshot(collection(db, "boletos"), (snapshot) => {
    data = {}
    snapshot.forEach((docu) => {
        data[docu.id] = docu.data()
    })
    renderGrid()
    actualizarContador()
})

// ASIGNAR / ACTUALIZAR
window.asignar = async function(){

    let nombreInput = document.getElementById("nombre").value
    ultimosAsignados = []

    for(let num of seleccionados){

        let nombreFinal = nombreInput

        if(data[num]){
            nombreFinal = data[num].nombre
        }

        if(!nombreFinal){
            alert("Escribe un nombre")
            return
        }

        await setDoc(doc(db, "boletos", num), {
            nombre: nombreFinal,
            pago: estadoPago,
            entrega: estadoEntrega
        })

        ultimosAsignados.push(num)
    }

    seleccionados = []
}

// LIBERAR
window.liberar = async function(){
    for(let num of seleccionados){
        if(data[num]){
            await deleteDoc(doc(db, "boletos", num))
        }
    }
    seleccionados = []
}

// GENERAR IMÁGENES
window.descargar = function(){

    if(ultimosAsignados.length === 0){
        alert("No hay boletos nuevos")
        return
    }

    const canvas = document.getElementById("canvas")
    const ctx = canvas.getContext("2d")

    for(let numero of ultimosAsignados){

        canvas.width = imagen.width
        canvas.height = imagen.height

        ctx.drawImage(imagen, 0, 0)

        let texto = numero + " - " + data[numero].nombre

        ctx.font = "30px Arial"

        let w = ctx.measureText(texto).width

        let x = canvas.width - w - 40
        let y = canvas.height - 40

        ctx.fillStyle = "white"
        ctx.fillRect(x-10, y-30, w+20, 40)

        ctx.fillStyle = "black"
        ctx.fillText(texto, x, y)

        let link = document.createElement("a")
        link.download = numero + ".png"
        link.href = canvas.toDataURL()
        link.click()
    }

    ultimosAsignados = []
}

// EXPORTAR EXCEL
window.exportarExcel = function(){

    let datos = [["Numero","Nombre","Pago","Entrega"]]

    for(let i=1; i<=150; i++){
        let num = String(i).padStart(3,'0')

        if(data[num]){
            datos.push([
                num,
                data[num].nombre,
                data[num].pago,
                data[num].entrega
            ])
        } else {
            datos.push([num,"LIBRE","",""])
        }
    }

    let wb = XLSX.utils.book_new()
    let ws = XLSX.utils.aoa_to_sheet(datos)

    XLSX.utils.book_append_sheet(wb, ws, "Boletos")

    XLSX.writeFile(wb, "boletos.xlsx")
}

</script>

</body>
</html>
