<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Boletos PRO</title>

<style>
body { font-family: Arial; text-align: center; }

.grid {
    display: grid;
    grid-template-columns: repeat(15, 50px);
    gap: 5px;
    justify-content: center;
}

.celda {
    width: 50px;
    height: 50px;
    border: 1px solid black;
    cursor: pointer;
    font-size: 12px;
    display:flex;
    align-items:center;
    justify-content:center;
}

.seleccionado {
    background: yellow;
}

.ocupado {
    background: red;
    color: white;
}
</style>
</head>

<body>

<h2>🎟 Sistema de Boletos</h2>

<input type="text" id="nombre" placeholder="Nombre"><br><br>

<button onclick="asignar()">Asignar</button>
<button onclick="liberar()">Liberar</button>
<button onclick="descargar()">Generar Imágenes</button>

<br><br>

<div class="grid" id="grid"></div>

<canvas id="canvas" style="display:none;"></canvas>

<script>

// Imagen fija
let imagen = new Image()
imagen.src = "i1.png"

let seleccionados = []
let data = JSON.parse(localStorage.getItem("boletos")) || {}

const grid = document.getElementById("grid")

function renderGrid(){
    grid.innerHTML = ""

    for(let i=1; i<=150; i++){
        let numStr = String(i).padStart(3,'0')

        let div = document.createElement("div")
        div.className = "celda"
        div.innerText = numStr

        if(data[numStr]){
            div.classList.add("ocupado")
        }

        div.onclick = () => {
            div.classList.toggle("seleccionado")

            if(seleccionados.includes(numStr)){
                seleccionados = seleccionados.filter(x => x !== numStr)
            } else {
                seleccionados.push(numStr)
            }
        }

        grid.appendChild(div)
    }
}

renderGrid()

// Asignar
function asignar(){
    let nombre = document.getElementById("nombre").value

    if(!nombre){
        alert("Escribe un nombre")
        return
    }

    seleccionados.forEach(num => {
        data[num] = nombre
    })

    guardar()
}

// Liberar boletos
function liberar(){
    seleccionados.forEach(num => {
        delete data[num]
    })

    guardar()
}

// Guardar en navegador
function guardar(){
    localStorage.setItem("boletos", JSON.stringify(data))
    seleccionados = []
    renderGrid()
}

// Generar imágenes SOLO de los asignados
function descargar(){

    if(!imagen.complete){
        alert("Imagen no cargada")
        return
    }

    const canvas = document.getElementById("canvas")
    const ctx = canvas.getContext("2d")

    for(let numero in data){

        canvas.width = imagen.width
        canvas.height = imagen.height

        ctx.drawImage(imagen, 0, 0)

        let texto = numero + " - " + data[numero]

        ctx.font = "30px Arial"

        let textWidth = ctx.measureText(texto).width

        let margen = 40
        let x = canvas.width - textWidth - margen
        let y = canvas.height - margen

        // fondo blanco
        ctx.fillStyle = "white"
        ctx.fillRect(x-10, y-30, textWidth+20, 40)

        // texto
        ctx.fillStyle = "black"
        ctx.fillText(texto, x, y)

        // descargar SOLO asignados
        let link = document.createElement("a")
        link.download = numero + ".png"
        link.href = canvas.toDataURL()
        link.click()
    }
}
</script>

</body>
</html>
