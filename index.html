<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Boletos Tipo Cine</title>

<style>
body { font-family: Arial; text-align: center; }

.grid {
    display: grid;
    grid-template-columns: repeat(15, 50px);
    gap: 5px;
    justify-content: center;
}

.celda {
    width: 50px;
    height: 50px;
    border: 1px solid black;
    cursor: pointer;
    font-size: 12px;
    display:flex;
    align-items:center;
    justify-content:center;
}

.seleccionado {
    background: yellow;
}
</style>
</head>

<body>

<h2>🎟 Sistema de Boletos</h2>

<input type="text" id="nombre" placeholder="Nombre"><br><br>

<button onclick="asignar()">Asignar</button>
<button onclick="descargar()">Generar Imágenes</button>

<br><br>

<div class="grid" id="grid"></div>

<canvas id="canvas" style="display:none;"></canvas>

<script>

// IMAGEN FIJA
let imagen = new Image()
imagen.src = "i1.png"

let seleccionados = []
let data = {}

// Crear matriz 10x15 (150 boletos)
const grid = document.getElementById("grid")

for(let i=1; i<=150; i++){
    let div = document.createElement("div")
    div.className = "celda"
    div.innerText = String(i).padStart(3,'0')

    div.onclick = () => {
        div.classList.toggle("seleccionado")

        if(seleccionados.includes(i)){
            seleccionados = seleccionados.filter(x => x !== i)
        } else {
            seleccionados.push(i)
        }
    }

    grid.appendChild(div)
}

// Asignar nombre a seleccionados
function asignar(){
    let nombre = document.getElementById("nombre").value

    seleccionados.forEach(num => {
        let key = String(num).padStart(3,'0')
        data[key] = nombre
    })

    alert("✅ Asignado")
}

// Generar imágenes
function descargar(){
    if(!imagen.complete){
        alert("La imagen aún no carga")
        return
    }

    const canvas = document.getElementById("canvas")
    const ctx = canvas.getContext("2d")

    for(let numero in data){

        canvas.width = imagen.width
        canvas.height = imagen.height

        ctx.drawImage(imagen, 0, 0)

        let texto = numero + " - " + data[numero]

        ctx.font = "30px Arial"

        let textWidth = ctx.measureText(texto).width

        // POSICIÓN INFERIOR DERECHA CON MARGEN
        let margen = 40
        let x = canvas.width - textWidth - margen
        let y = canvas.height - margen

        // fondo blanco
        ctx.fillStyle = "white"
        ctx.fillRect(x-10, y-30, textWidth+20, 40)

        // texto
        ctx.fillStyle = "black"
        ctx.fillText(texto, x, y)

        // descargar
        let link = document.createElement("a")
        link.download = numero + ".png"
        link.href = canvas.toDataURL()
        link.click()
    }
}
</script>

</body>
</html>
