<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Boletos PRO</title>

<style>
body { font-family: Arial; text-align: center; }

.grid {
    display: grid;
    grid-template-columns: repeat(15, 50px);
    gap: 5px;
    justify-content: center;
}

.celda {
    width: 50px;
    height: 50px;
    border: 1px solid black;
    cursor: pointer;
    font-size: 12px;
    display:flex;
    align-items:center;
    justify-content:center;
}

.seleccionado { background: yellow; }
.ocupado { background: red; color: white; }
</style>
</head>

<body>

<h2>🎟 Sistema de Boletos</h2>

<input type="text" id="nombre" placeholder="Nombre"><br><br>

<button onclick="asignar()">Asignar</button>
<button onclick="liberar()">Liberar</button>
<button onclick="descargar()">Generar Imágenes</button>
<button onclick="exportarExcel()">Exportar Excel</button>

<br><br>

<div class="grid" id="grid"></div>

<canvas id="canvas" style="display:none;"></canvas>

<script type="module">

// 🔥 FIREBASE (SIN ANALYTICS)
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

// TU CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyANkyhYoCL1hMMW0taqf7XSEvDwapHT1O8",
  authDomain: "polladag.firebaseapp.com",
  projectId: "polladag",
  storageBucket: "polladag.firebasestorage.app",
  messagingSenderId: "392850708569",
  appId: "1:392850708569:web:f901a1d0fa6d7c7da1f948"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Imagen base
let imagen = new Image()
imagen.src = "i1.png"

// Datos
let seleccionados = []
let data = {}

const grid = document.getElementById("grid")

// Renderizar matriz
function renderGrid(){
    grid.innerHTML = ""

    for(let i=1; i<=150; i++){
        let num = String(i).padStart(3,'0')

        let div = document.createElement("div")
        div.className = "celda"
        div.innerText = num

        if(data[num]) div.classList.add("ocupado")

        div.onclick = () => {
            div.classList.toggle("seleccionado")

            if(seleccionados.includes(num)){
                seleccionados = seleccionados.filter(x => x !== num)
            } else {
                seleccionados.push(num)
            }
        }

        grid.appendChild(div)
    }
}

// 🔄 TIEMPO REAL
onSnapshot(collection(db, "boletos"), (snapshot) => {
    data = {}
    snapshot.forEach((docu) => {
        data[docu.id] = docu.data().nombre
    })
    renderGrid()
})

// Asignar
window.asignar = async function(){
    let nombre = document.getElementById("nombre").value

    if(!nombre){
        alert("Escribe un nombre")
        return
    }

    for(let num of seleccionados){
        await setDoc(doc(db, "boletos", num), {nombre: nombre})
    }

    seleccionados = []
}

// Liberar
window.liberar = async function(){
    for(let num of seleccionados){
        await deleteDoc(doc(db, "boletos", num))
    }

    seleccionados = []
}

// Exportar Excel
window.exportarExcel = function(){
    let csv = "Numero,Nombre\n"

    for(let num in data){
        csv += num + "," + data[num] + "\n"
    }

    let blob = new Blob([csv], {type: "text/csv"})
    let link = document.createElement("a")
    link.href = URL.createObjectURL(blob)
    link.download = "boletos.csv"
    link.click()
}

// Generar imágenes
window.descargar = function(){

    if(!imagen.complete){
        alert("Imagen no cargada")
        return
    }

    const canvas = document.getElementById("canvas")
    const ctx = canvas.getContext("2d")

    for(let numero in data){

        canvas.width = imagen.width
        canvas.height = imagen.height

        ctx.drawImage(imagen, 0, 0)

        let texto = numero + " - " + data[numero]

        ctx.font = "30px Arial"

        let w = ctx.measureText(texto).width

        let x = canvas.width - w - 40
        let y = canvas.height - 40

        ctx.fillStyle = "white"
        ctx.fillRect(x-10, y-30, w+20, 40)

        ctx.fillStyle = "black"
        ctx.fillText(texto, x, y)

        let link = document.createElement("a")
        link.download = numero + ".png"
        link.href = canvas.toDataURL()
        link.click()
    }
}

</script>

</body>
</html>
