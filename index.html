<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Boletos PRO</title>

<style>
body { font-family: Arial; text-align: center; }

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(15, 50px);
    gap: 5px;
    justify-content: center;
}

/* LIBRES */
.celda {
    width: 50px;
    height: 50px;
    border: 1px solid black;
    cursor: pointer;
    font-size: 10px;
    line-height: 1.1;
    text-align: center;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction: column;
    background: #007bff;
    color: white;
    position: relative; /* necesario para franja */
}

/* ESTADOS */
.seleccionado { background: yellow; color: black; }
.ocupado { color: white; }
.liberar { background: green; color: white; }

/* FRANJA INFERIOR */
.franja {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 6px;
    border-bottom-left-radius: 3px;
    border-bottom-right-radius: 3px;
}

.pagadoBar { background: #00c853; }
.debeBar { background: #2962ff; }

/* BOTONES */
.btn {
    padding: 8px 12px;
    margin: 5px;
    border: none;
    cursor: pointer;
    color: white;
    border-radius: 5px;
}

.activo { border: 3px solid black; }

.pagado { background: green; }
.debe { background: red; }

.recogido { background: green; }
.norecogido { background: gray; }

</style>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

</head>

<body>

<h2>🎟 Sistema de Boletos</h2>

<input type="text" id="nombre" placeholder="Nombre"><br><br>

<h4>Pago</h4>
<button class="btn pagado activo" id="btnPagado">Pagado</button>
<button class="btn debe" id="btnDebe">Debe</button>

<h4>Entrega</h4>
<button class="btn recogido activo" id="btnRecogido">Recogido</button>
<button class="btn norecogido" id="btnNoRecogido">No recogido</button>

<br><br>

<button onclick="asignar()">Asignar / Actualizar</button>
<button onclick="liberar()">Liberar</button>
<button onclick="descargar()">Generar Imágenes</button>
<button onclick="exportarExcel()">Exportar Excel</button>

<h3>
🟢 Libres: <span id="libres">0</span> |
🔴 Vendidos: <span id="vendidos">0</span>
</h3>

<p>🔵 Libres | 🎨 Ocupados | 🟢 Liberar</p>

<div class="grid" id="grid"></div>

<canvas id="canvas" style="display:none;"></canvas>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyANkyhYoCL1hMMW0taqf7XSEvDwapHT1O8",
  authDomain: "polladag.firebaseapp.com",
  projectId: "polladag",
  storageBucket: "polladag.firebasestorage.app",
  messagingSenderId: "392850708569",
  appId: "1:392850708569:web:f901a1d0fa6d7c7da1f948"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let imagen = new Image()
imagen.src = "i1.png"

let seleccionados = []
let data = {}
let ultimosAsignados = []

let estadoPago = "Pagado"
let estadoEntrega = "Recogido"

// COLOR POR NOMBRE
function colorPorNombre(nombre){
    let hash = 0
    for(let i = 0; i < nombre.length; i++){
        hash = nombre.charCodeAt(i) + ((hash << 5) - hash)
    }

    let color = "#"
    for(let i = 0; i < 3; i++){
        let value = (hash >> (i * 8)) & 255
        color += ("00" + value.toString(16)).slice(-2)
    }

    return color
}

// TEXTO LEGIBLE
function colorTexto(bgColor){
    let r = parseInt(bgColor.substr(1,2),16)
    let g = parseInt(bgColor.substr(3,2),16)
    let b = parseInt(bgColor.substr(5,2),16)

    let luminosidad = (0.299*r + 0.587*g + 0.114*b)
    return luminosidad > 186 ? "black" : "white"
}

// BOTONES
function activarBoton(grupo, activo){
    grupo.forEach(btn => btn.classList.remove("activo"))
    activo.classList.add("activo")
}

const btnPagado = document.getElementById("btnPagado")
const btnDebe = document.getElementById("btnDebe")

btnPagado.onclick = () => {
    estadoPago = "Pagado"
    activarBoton([btnPagado, btnDebe], btnPagado)
}

btnDebe.onclick = () => {
    estadoPago = "Debe"
    activarBoton([btnPagado, btnDebe], btnDebe)
}

const btnRecogido = document.getElementById("btnRecogido")
const btnNoRecogido = document.getElementById("btnNoRecogido")

btnRecogido.onclick = () => {
    estadoEntrega = "Recogido"
    activarBoton([btnRecogido, btnNoRecogido], btnRecogido)
}

btnNoRecogido.onclick = () => {
    estadoEntrega = "No recogido"
    activarBoton([btnRecogido, btnNoRecogido], btnNoRecogido)
}

const grid = document.getElementById("grid")

function actualizarContador(){
    let vendidos = Object.keys(data).length
    let libres = 225 - vendidos

    document.getElementById("vendidos").innerText = vendidos
    document.getElementById("libres").innerText = libres
}

function renderGrid(){
    grid.innerHTML = ""

    for(let i=1; i<=225; i++){
        let num = String(i).padStart(3,'0')

        let div = document.createElement("div")
        div.className = "celda"

        if(data[num]){
            div.classList.add("ocupado")

            let info = data[num]

            let color = colorPorNombre(info.nombre)
            div.style.background = color
            div.style.color = colorTexto(color)

            div.innerHTML = `
                ${num}<br>
                ${info.nombre.substring(0,6)}<br>
                ${info.pago === "Pagado" ? "P" : "D"}-${info.entrega === "Recogido" ? "R" : "NR"}
            `

            // TOOLTIP
            div.title =
                "Nombre: " + info.nombre + "\n" +
                "Pago: " + info.pago + "\n" +
                "Entrega: " + info.entrega

            // FRANJA
            let franja = document.createElement("div")
            franja.classList.add("franja")

            if(info.pago === "Pagado"){
                franja.classList.add("pagadoBar")
            } else {
                franja.classList.add("debeBar")
            }

            div.appendChild(franja)

        } else {
            div.innerText = num
        }

        div.onclick = () => {

            if(data[num]){
                div.classList.toggle("liberar")

                if(div.classList.contains("liberar")){
                    div.style.background = "green"
                    div.style.color = "white"
                } else {
                    let color = colorPorNombre(data[num].nombre)
                    div.style.background = color
                    div.style.color = colorTexto(color)
                }

            } else {
                div.classList.toggle("seleccionado")
            }

            if(seleccionados.includes(num)){
                seleccionados = seleccionados.filter(x => x !== num)
            } else {
                seleccionados.push(num)
            }
        }

        grid.appendChild(div)
    }
}

// FIREBASE
onSnapshot(collection(db, "boletos"), (snapshot) => {
    data = {}
    snapshot.forEach((docu) => {
        data[docu.id] = docu.data()
    })
    renderGrid()
    actualizarContador()
})

// RESTO IGUAL
window.asignar = async function(){ /* igual */ }
window.liberar = async function(){ /* igual */ }
window.descargar = function(){ /* igual */ }
window.exportarExcel = function(){ /* igual */ }

</script>

</body>
</html>
