<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Control Carrito + Radar (Serial)</title>

<style>

body{
    font-family: Arial;
    background:#ecf3f9;
    text-align:center;
}

h2{
    margin:5px;
}

/* PANEL */

#panel{
    display:flex;
    justify-content:center;
    gap:20px;
}

/* BOTONES */

button{
    font-size:20px;
    width:60px;
    height:60px;
    cursor:pointer;
}

/* RADAR */

canvas{
    background:black;
    margin:10px;
    border:2px solid #333;
}

/* LOG */

#log{
    width:90%;
    height:120px;
    margin:auto;
    background:black;
    color:lime;
    font-family: Consolas;
    overflow:auto;
    padding:5px;
}

</style>
</head>

<body>

<h2>CONTROL REMOTO CON RADAR (SERIAL)</h2>

<button onclick="conectar()">🔌 Conectar</button>

<br><br>

<div id="panel">

<!-- COMANDOS -->
<div>
<h3>Comandos</h3>

Adelante <input id="cmdF" value="F" size="2"><br>
Atrás <input id="cmdB" value="B" size="2"><br>
Izquierda <input id="cmdL" value="L" size="2"><br>
Derecha <input id="cmdR" value="R" size="2"><br>
Stop <input id="cmdS" value="S" size="2"><br>

</div>

<!-- CONTROL -->
<div>
<h3>Control</h3>

<button onclick="enviar(cmdF.value)">⬆</button><br>

<button onclick="enviar(cmdL.value)">⬅</button>
<button onclick="enviar(cmdS.value)">🛑</button>
<button onclick="enviar(cmdR.value)">➡</button><br>

<button onclick="enviar(cmdB.value)">⬇</button>

</div>

</div>

<br>

<!-- RADAR -->
<canvas id="radar" width="350" height="350"></canvas>

<!-- LOG -->
<div id="log"></div>


<script>

let port;
let reader;
let writer;

const canvas = document.getElementById("radar");
const ctx = canvas.getContext("2d");

const center = 175;
const maxDist = 100;


// ==========================
// LOG
// ==========================

function log(txt){

    const l = document.getElementById("log");

    l.innerHTML += txt + "<br>";
    l.scrollTop = l.scrollHeight;
}


// ==========================
// SERIAL
// ==========================

async function conectar(){

    try{

        port = await navigator.serial.requestPort();

        await port.open({ baudRate:9600 });

        writer = port.writable.getWriter();
        reader = port.readable.getReader();

        log("✅ Conectado al Arduino");

        leerSerial();

    }catch(e){

        alert("Error: " + e);

    }

}


// ==========================
// LEER DATOS
// ==========================

async function leerSerial(){

    let buffer = "";

    while(true){

        const { value, done } = await reader.read();

        if(done) break;

        buffer += new TextDecoder().decode(value);

        if(buffer.includes("\n")){

            let lines = buffer.split("\n");

            buffer = lines.pop();

            lines.forEach(p => procesar(p.trim()));

        }
    }
}


// ==========================
// PROCESAR DATOS
// ==========================

function procesar(data){

    log("🤖 " + data);

    if(data.includes(",")){

        let [ang, dist] = data.split(",");

        dibujarRadar(
            parseFloat(ang),
            parseFloat(dist)
        );

    }
}


// ==========================
// ENVIAR
// ==========================

async function enviar(cmd){

    if(!writer){

        alert("Conecta primero");
        return;

    }

    await writer.write(
        new TextEncoder().encode(cmd + "\n")
    );

    log("📤 " + cmd);

}


// ==========================
// RADAR
// ==========================

function baseRadar(){

    ctx.clearRect(0,0,350,350);

    ctx.strokeStyle="lime";
    ctx.lineWidth=1;

    // Circulos
    for(let i=1;i<=4;i++){

        let r = i*(center/4);

        ctx.beginPath();
        ctx.arc(center,center,r,0,Math.PI*2);
        ctx.stroke();

        ctx.fillStyle="lime";
        ctx.fillText(
            Math.round(i*maxDist/4)+"cm",
            center-15,
            center-r+10
        );

    }

    // Cruz
    ctx.beginPath();
    ctx.moveTo(0,center);
    ctx.lineTo(350,center);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(center,0);
    ctx.lineTo(center,350);
    ctx.stroke();

}


// ==========================
// DIBUJAR
// ==========================

function dibujarRadar(ang, dist){

    baseRadar();

    if(dist > maxDist) dist = maxDist;

    let r = (dist/maxDist)*center;

    let rad = ang * Math.PI/180;

    let x = center + r*Math.cos(rad);
    let y = center - r*Math.sin(rad);

    // Punto
    ctx.fillStyle="red";

    ctx.beginPath();
    ctx.arc(x,y,5,0,Math.PI*2);
    ctx.fill();

    // Rayo
    ctx.strokeStyle="lime";
    ctx.lineWidth=2;

    let x2 = center + center*Math.cos(rad);
    let y2 = center - center*Math.sin(rad);

    ctx.beginPath();
    ctx.moveTo(center,center);
    ctx.lineTo(x2,y2);
    ctx.stroke();

    // Texto
    ctx.fillStyle="white";

    ctx.fillText(
        `A:${ang}° D:${dist}cm`,
        10,20
    );

}


// Inicial
baseRadar();
log("✅ Sistema listo");

</script>

</body>
</html>
